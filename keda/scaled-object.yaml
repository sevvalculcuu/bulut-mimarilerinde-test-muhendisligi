apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: qrcode-app-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qrcode-app
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 30
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        # Address of our prometheus server inside K8s
        serverAddress: http://qrcode-prometheus-service:9090
        metricName: http_requests_rate
        # Prometheus query checking the request rate over 2 minutes
        query: sum(rate(http_requests_total{app="qrcode-app"}[2m]))
        threshold: '5' # Scale up if a pod receives more than 5 requests per second
